<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Driver</title>
    <meta name="title" content="Modern Driver" />
    <meta

      content="A curated marketplace for collector and classic cars. Browse rare vehicles, track live auctions, and build your virtual garage."

    <meta property="og:type" content="website" />

    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://modern-driver.vercel.app" />

      name="twitter:description"

      name="twitter:image"

    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const stored = localStorage.getItem("theme-storage");
      if (stored) {
        const { state } = JSON.parse(stored);
        if (state.theme === "dark") {
          document.documentElement.classList.add("dark");
        }
      }
    </script>
  </body>
</html>
